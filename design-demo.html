<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ────────────────────────────────────────────
   CSS Variables (injected as inline style)
   ──────────────────────────────────────────── */
const V = {
  brandBlue: '#0066CC',
  brandBlueLight: '#E8F2FF',
  brandBlueDark: '#004C99',
  brandYellow: '#F5C518',
  brandRed: '#E31837',

  warning: '#F59E0B',

/* ────────────────────────────────────────────
   BrowserWindow Component
   ──────────────────────────────────────────── */
const browserWindowStyles = {
  window: { display: 'inline-block', background: '#fff', borderRadius: 10, overflow: 'hidden', boxShadow: '0 30px 80px rgba(0,0,0,0.25), 0 0 0 0.5px rgba(0,0,0,0.15)' },
  chrome: { background: '#dee1e6', paddingTop: 10, paddingLeft: 10, paddingRight: 10, userSelect: 'none' },
  tabRow: { display: 'flex', alignItems: 'flex-end', gap: 6, position: 'relative' },
  trafficLights: { display: 'flex', gap: 8, alignItems: 'center', paddingBottom: 10, marginRight: 8 },
  light: { width: 12, height: 12, borderRadius: '50%', border: '0.5px solid rgba(0,0,0,0.15)' },
  close: { background: '#ff5f57' }, minimize: { background: '#febc2e' }, maximize: { background: '#28c840' },
  tab: { background: '#fff', padding: '8px 30px 8px 14px', borderTopLeftRadius: 10, borderTopRightRadius: 10, fontSize: 12, color: '#222', fontFamily: '-apple-system, sans-serif', maxWidth: 220, display: 'flex', alignItems: 'center', gap: 8, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' },
  favicon: { width: 14, height: 14, borderRadius: 2, background: '#999', flexShrink: 0 },
  navBar: { background: '#fff', padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: '1px solid #e5e7eb' },
  navButtons: { display: 'flex', gap: 4, color: '#5f6368', fontSize: 16 },
  navButton: { width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: '50%', cursor: 'pointer' },
  urlBar: { flex: 1, background: '#f1f3f4', borderRadius: 999, padding: '7px 14px', fontSize: 13, color: '#333', display: 'flex', alignItems: 'center', gap: 8, fontFamily: '-apple-system, sans-serif' },
  lockIcon: { color: '#5f6368', fontSize: 12 },
  content: { position: 'relative', overflow: 'auto', background: '#fff' },
};

function BrowserWindow({ title, url, width, height, children }) {
  return (
    <div style={browserWindowStyles.window}>
      <div style={browserWindowStyles.chrome}>
        <div style={browserWindowStyles.tabRow}>
          <div style={browserWindowStyles.trafficLights}>
            <div style={{...browserWindowStyles.light, ...browserWindowStyles.close}} />
            <div style={{...browserWindowStyles.light, ...browserWindowStyles.minimize}} />
            <div style={{...browserWindowStyles.light, ...browserWindowStyles.maximize}} />
          </div>
          <div style={browserWindowStyles.tab}>
            <div style={browserWindowStyles.favicon} />
            <span>{title}</span>
          </div>
        </div>
      </div>
      <div style={browserWindowStyles.navBar}>
        <div style={browserWindowStyles.navButtons}>
          <div style={browserWindowStyles.navButton}>&#8592;</div>
          <div style={browserWindowStyles.navButton}>&#8594;</div>
          <div style={browserWindowStyles.navButton}>&#8635;</div>
        </div>
        <div style={browserWindowStyles.urlBar}>
          <span style={browserWindowStyles.lockIcon}>&#128274;</span>
          <span>{url}</span>
        </div>
      </div>
      <div style={{...browserWindowStyles.content, width, height}}>
        {children}
      </div>
    </div>
  );
}

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  ),

    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>

  ),
  eye: (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>

/* ────────────────────────────────────────────

   ──────────────────────────────────────────── */

  return (
    <div style={{ display: 'flex', height: '100%', minHeight: 560 }}>

      <div style={{

        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        padding: 32,
        position: 'relative',
        overflow: 'hidden',
      }}>
        {/* Decorative circles */}
        <div style={{ position: 'absolute', top: -30, right: -30, width: 120, height: 120, borderRadius: '50%', background: 'rgba(0,102,204,0.06)' }} />
        <div style={{ position: 'absolute', bottom: -20, left: -20, width: 80, height: 80, borderRadius: '50%', background: 'rgba(245,197,24,0.08)' }} />

        <div style={{ position: 'relative', zIndex: 1, textAlign: 'center' }}>
          <img

          <h1 style={{
            fontSize: 22,

/* ────────────────────────────────────────────
   2. DASHBOARD PAGE
   ──────────────────────────────────────────── */
function DashboardPage() {
  const menuItems = [
    { icon: Icons.order, label: '工单管理', active: false },
    { icon: Icons.dashboard, label: '数据看板', active: true },
    { icon: Icons.master, label: '师傅管理', active: false },
    { icon: Icons.callback, label: '回访管理', active: false },
    { icon: Icons.complaint, label: '投诉管理', active: false },
    { icon: Icons.settings, label: '系统设置', active: false },
  ];

  const kpiCards = [
    { label: '工单总数', value: '156', unit: '单', color: V.brandBlue, bg: V.brandBlueLight },
    { label: '完成率', value: '89.7', unit: '%', color: V.success, bg: '#ECFDF5' },
    { label: '取消率', value: '5.1', unit: '%', color: V.warning, bg: '#FFFBEB' },
    { label: '平均满意度', value: '4.6', unit: '/5', color: V.brandYellow, bg: '#FEFCE8' },
    { label: '总营收', value: '28,650', unit: '元', color: V.brandBlueDark, bg: V.brandBlueLight },
    { label: '待回访', value: '23', unit: '单', color: V.brandRed, bg: '#FEF2F2' },
  ];

  return (
    <div style={{ display: 'flex', height: '100%', minHeight: 560, background: V.bgPage }}>
      {/* Sidebar */}
      <div style={{
        width: 160,
        background: V.bgSidebar,
        borderRight: `1px solid ${V.border}`,
        display: 'flex',
        flexDirection: 'column',
        flexShrink: 0,
      }}>
        {/* Logo */}
        <div style={{
          padding: '14px 16px',
          display: 'flex',
          alignItems: 'center',
          gap: 10,
          borderBottom: `1px solid ${V.borderLight}`,
        }}>
          <img src="assets/logo.png" alt="" style={{ width: 28, height: 28, objectFit: 'contain' }} />
          <span style={{ fontSize: 14, fontWeight: 600, color: V.textPrimary }}>乐修匠</span>
        </div>

        {/* Nav */}
        <nav style={{ padding: '8px 0', flex: 1 }}>
          {menuItems.map((item, i) => (
            <div key={i} style={{
              display: 'flex',
              alignItems: 'center',
              gap: 10,
              padding: '9px 16px',
              margin: '1px 8px',
              borderRadius: 8,
              fontSize: 13,
              color: item.active ? V.brandBlue : V.textSecondary,
              background: item.active ? V.brandBlueLight : 'transparent',
              fontWeight: item.active ? 500 : 400,
              cursor: 'pointer',
            }}>
              {item.icon}
              <span>{item.label}</span>
            </div>
          ))}
        </nav>
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Top Bar */}
        <div style={{
          height: 48,
          background: V.bgCard,
          borderBottom: `1px solid ${V.border}`,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          padding: '0 16px',
          flexShrink: 0,
        }}>
          <span style={{ fontSize: 14, fontWeight: 500, color: V.textPrimary }}>数据看板</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{ color: V.textMuted, cursor: 'pointer' }}>{Icons.bell}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{
                width: 26, height: 26, borderRadius: '50%',
                background: V.brandBlueLight,
                display: 'flex', alignItems: 'center', justifyContent: 'center',

              <span style={{ fontSize: 12, color: V.textSecondary }}>管理员</span>

          </div>
        </div>

        {/* Content */}
        <div style={{ flex: 1, padding: 14, overflow: 'auto' }}>
          {/* KPI Cards */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(2, 1fr)',
            gap: 10,
            marginBottom: 14,
          }}>
            {kpiCards.map((kpi, i) => (
              <div key={i} style={{
                background: V.bgCard,
                borderRadius: 12,
                padding: '12px 14px',
                boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
              }}>
                <div style={{ fontSize: 11, color: V.textMuted, marginBottom: 6 }}>{kpi.label}</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
                  <span style={{ fontSize: 22, fontWeight: 700, color: kpi.color }}>{kpi.value}</span>
                  <span style={{ fontSize: 11, color: V.textMuted }}>{kpi.unit}</span>
                </div>
              </div>

          {/* Charts Area */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {/* Trend Chart */}
            <div style={{
              background: V.bgCard,
              borderRadius: 12,
              padding: 14,
              boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
            }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: V.textPrimary, marginBottom: 12 }}>工单趋势（近7日）</div>

                {/* Grid lines */}
                {[0, 20, 40, 60, 80].map(y => (
                  <line key={y} x1="0" y1={y} x2="200" y2={y} stroke={V.borderLight} strokeWidth="0.5" />
                ))}
                {/* Area fill */}
                <path d="M0,60 L33,45 L66,50 L100,30 L133,35 L166,20 L200,25 L200,80 L0,80 Z"
                  fill="url(#areaGrad)" opacity="0.3" />
                {/* Line */}
                <polyline points="0,60 33,45 66,50 100,30 133,35 166,20 200,25"
                  fill="none" stroke={V.brandBlue} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />

                {[[0,60],[33,45],[66,50],[100,30],[133,35],[166,20],[200,25]].map(([x,y], i) => (
                  <circle key={i} cx={x} cy={y} r="3" fill="#fff" stroke={V.brandBlue} strokeWidth="1.5" />
                ))}
                <defs>
                  <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={V.brandBlue} stopOpacity="0.3" />
                    <stop offset="100%" stopColor={V.brandBlue} stopOpacity="0" />

              </svg>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontSize: 10, color: V.textMuted }}>

              background: V.bgCard,
              borderRadius: 12,

              boxShadow: '0 1px 3px rgba(0,0,0,0.04)',

              <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                <svg viewBox="0 0 100 100" style={{ width: 80, height: 80, flexShrink: 0 }}>
                  {/* Donut: completed 60%, in-progress 20%, pending 12%, cancelled 8% */}
