<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添加师傅 - 乐修匠社区维修管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCF8;
  --fg: #2C2C24;
  --primary: #4A7FB5;
  --primary-fg: #FFFFFF;
  --secondary: #E8B84B;
  --secondary-fg: #FFFFFF;
  --accent: #E6DCCD;
  --accent-fg: #4A4A40;
  --muted: #F0EBE5;
  --muted-fg: #78786C;
  --border: #DED8CF;
  --destructive: #D4726A;
  --card-bg: #FEFEFA;
  --shadow-soft: 0 4px 20px -2px rgba(74, 127, 181, 0.15);
  --shadow-float: 0 10px 40px -10px rgba(232, 184, 75, 0.2);
  --shadow-hover: 0 20px 40px -10px rgba(74, 127, 181, 0.15);
  --nav-width: 220px;
  --topbar-height: 56px;
  --font-display: 'Fraunces', 'PingFang SC', 'Microsoft YaHei', serif;
  --font-body: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
html, body {
  height: 100vh;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
/* ===== Paper Texture (Critical!) ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
  opacity: 0.5;
}
/* ===== Layout ===== */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}
/* ===== Left Sidebar ===== */
.sidebar {
  width: var(--nav-width);
  min-width: var(--nav-width);
  height: 100vh;
  background: rgba(253,252,248,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid rgba(222,216,207,0.5);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  z-index: 10;
  position: relative;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  margin-bottom: 8px;
}
.logo-img {
  height: 36px;
  width: auto;
  flex-shrink: 0;
}
.logo-text h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--fg);
  line-height: 1.2;
}
.logo-text p {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 11px;
  color: var(--muted-fg);
  margin-top: 2px;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
  margin: 0 12px;
  padding: 0 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: var(--muted-fg);
  font-size: 14px;
  font-weight: 500;
  position: relative;
}
.nav-item:hover {
  background: rgba(230,220,205,0.3);
}
.nav-item.active {
  background: rgba(74,127,181,0.1);
  color: var(--primary);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--primary);
}
.nav-item svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
  flex-shrink: 0;
}
.sidebar-footer {
  padding: 0 20px;
  font-size: 11px;
  color: var(--muted-fg);
  font-weight: 400;
  opacity: 0.7;
}
/* ===== Main Content ===== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}
/* Background blobs */
.main-content::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: var(--primary);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  filter: blur(80px);
  opacity: 0.06;
  pointer-events: none;
  z-index: 0;
}
.main-content::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: -30px;
  width: 160px;
  height: 160px;
  background: var(--secondary);
  border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
  filter: blur(60px);
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
}
/* ===== Top Bar ===== */
.topbar {
  height: var(--topbar-height);
  min-height: var(--topbar-height);
  background: rgba(253,252,248,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(222,216,207,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: relative;
  z-index: 5;
}
.breadcrumb {
  font-size: 13px;
  color: var(--muted-fg);
  font-weight: 400;
}
.breadcrumb span { opacity: 0.5; }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.notification-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  transition: all 0.3s ease;
  position: relative;
}
.notification-btn:hover { background: rgba(74,127,181,0.08); }
.notification-btn .badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--destructive);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-body);
}
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
}
/* ===== Page Content Area ===== */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 20px;
  position: relative;
  z-index: 1;
}
.page-content::-webkit-scrollbar { width: 6px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
/* ===== Page Header ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: var(--fg);
}
.btn-cancel {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 24px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted-fg);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-cancel:hover {
  border-color: var(--muted-fg);
  color: var(--fg);
  background: rgba(222,216,207,0.2);
}
/* ===== Form Card ===== */
.form-card {
  background: var(--card-bg);
  border-radius: 24px;
  box-shadow: var(--shadow-soft);
  padding: 32px;
  margin-bottom: 20px;
}
/* ===== Section Block ===== */
.form-section {
  margin-bottom: 32px;
}
.form-section:last-child {
  margin-bottom: 0;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  color: var(--fg);
  margin-bottom: 24px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary);
  display: inline-block;
}
/* ===== Form Grid ===== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.form-grid .full-width {
  grid-column: 1 / -1;
}
/* ===== Form Field ===== */
.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-label {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  color: #5C5A50;
}
.form-label .required {
  color: var(--destructive);
  margin-left: 2px;
}
/* ===== Pill Input ===== */
.form-input {
  width: 100%;
  height: 48px;
  padding: 0 20px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--fg);
  outline: none;
  transition: all 0.3s ease;
}
.form-input::placeholder {
  color: var(--muted-fg);
  opacity: 0.6;
}
.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,127,181,0.15);
  background: rgba(255,255,255,0.8);
}
/* ===== Number Input with suffix ===== */
.input-group {
  position: relative;
}
.input-group .form-input {
  padding-right: 40px;
}
.input-suffix {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  font-weight: 600;
  color: var(--muted-fg);
  pointer-events: none;
}
/* ===== Textarea ===== */
.form-textarea {
  width: 100%;
  min-height: 100px;
  padding: 14px 20px;
  border-radius: 24px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--fg);
  outline: none;
  resize: vertical;
  transition: all 0.3s ease;
  line-height: 1.6;
}
.form-textarea::placeholder {
  color: var(--muted-fg);
  opacity: 0.6;
}
.form-textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,127,181,0.15);
  background: rgba(255,255,255,0.8);
}
/* ===== Status Toggle ===== */
.status-toggle {
  display: flex;
  gap: 8px;
  height: 48px;
}
.status-btn {
  flex: 1;
  height: 48px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--muted-fg);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.status-btn:hover {
  border-color: var(--border);
  background: rgba(255,255,255,0.7);
}
.status-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 2px 8px rgba(74,127,181,0.25);
}
.status-btn svg {
  width: 16px;
  height: 16px;
}
/* ===== Skill Tags ===== */
.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.skill-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(222,216,207,0.5);
  color: #8B7E6A;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  user-select: none;
  border: 1px solid transparent;
}
.skill-tag:hover {
  background: rgba(222,216,207,0.8);
  transform: translateY(-1px);
}
.skill-tag.selected {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(74,127,181,0.25);
}
.skill-tag svg {
  width: 16px;
  height: 16px;
  opacity: 0.7;
  transition: opacity 0.3s ease;
}
.skill-tag.selected svg {
  opacity: 1;
}
/* ===== Bottom Action Bar ===== */
.action-bar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 16px 0 0;
}
.btn-save {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 120px;
  height: 48px;
  border-radius: 999px;
  border: none;
  background: var(--primary);
  color: white;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 14px rgba(74,127,181,0.3);
}
.btn-save:hover {
  background: #3D6FA3;
  box-shadow: 0 6px 20px rgba(74,127,181,0.4);
  transform: translateY(-1px);
}
.btn-save:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(74,127,181,0.3);
}
.btn-save svg {
  width: 18px;
  height: 18px;
}
/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .form-card { padding: 20px; }
  .page-content { padding: 16px; }
}
</style>
</head>

              <label class="form-label">状态</label>
              <div class="status-toggle">
                <button type="button" class="status-btn active" data-value="enabled" onclick="toggleStatus(this)">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  启用
                </button>
                <button type="button" class="status-btn" data-value="disabled" onclick="toggleStatus(this)">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  停用
                </button>
              </div>
            </div>
            <!-- Remark -->
            <div class="form-field full-width">
              <label class="form-label">备注</label>
              <textarea class="form-textarea" placeholder="请输入备注信息（选填）" rows="3"></textarea>
            </div>
          </div>
        </div>

        <!-- Section B: Skills -->
        <div class="form-section">
          <div class="section-title">擅长类型</div>
          <div class="skill-tags">
            <span class="skill-tag" data-skill="水电维修" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              水电维修
            </span>
            <span class="skill-tag" data-skill="下水疏通" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
              下水疏通
            </span>
            <span class="skill-tag" data-skill="家具门窗" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
              家具门窗
            </span>
            <span class="skill-tag" data-skill="家电维修" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              家电维修
            </span>
            <span class="skill-tag" data-skill="家电清洗" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
              家电清洗
            </span>
            <span class="skill-tag" data-skill="测漏防水" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
              测漏防水
            </span>
            <span class="skill-tag" data-skill="开锁换锁" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
              开锁换锁
            </span>
            <span class="skill-tag" data-skill="局部翻新" onclick="toggleSkill(this)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/></svg>
              局部翻新
            </span>
          </div>
        </div>
      </div>

      <!-- Bottom Action Bar -->
      <div class="action-bar">
        <button class="btn-save" onclick="handleSave()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          保存
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// Status toggle
function toggleStatus(btn) {
  const group = btn.parentElement;
  group.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Skill tag toggle
function toggleSkill(tag) {
  tag.classList.toggle('selected');
}

// Save handler
function handleSave() {
  const name = document.querySelector('input[placeholder="请输入师傅姓名"]').value.trim();
  const phone = document.querySelector('input[placeholder="请输入手机号"]').value.trim();
  const commission = document.querySelector('input[type="number"]').value;
  const status = document.querySelector('.status-btn.active').dataset.value;
  const skills = Array.from(document.querySelectorAll('.skill-tag.selected')).map(t => t.dataset.skill);
  const remark = document.querySelector('.form-textarea').value.trim();

  // Validation
  if (!name) {
    showToast('请输入师傅姓名');
    return;
  }
  if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
    showToast('请输入正确的手机号');
    return;
  }

  console.log('Saving technician:', { name, phone, commission, status, skills, remark });
  showToast('师傅信息保存成功');
}

// Simple toast notification
function showToast(message) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.textContent = message;
  Object.assign(toast.style, {
    position: 'fixed',
    top: '24px',
    left: '50%',
    transform: 'translateX(-50%)',
    padding: '12px 28px',
    borderRadius: '999px',
    background: 'var(--fg)',
    color: 'white',
    fontFamily: 'var(--font-body)',
    fontSize: '14px',
    fontWeight: '600',
    boxShadow: '0 8px 30px rgba(0,0,0,0.15)',
    zIndex: '10000',
    opacity: '0',
    transition: 'opacity 0.3s ease'
  });
  document.body.appendChild(toast);
  requestAnimationFrame(() => { toast.style.opacity = '1'; });
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
</script>
</body>
</html>
