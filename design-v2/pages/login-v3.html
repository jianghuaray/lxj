<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐修匠 - 登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FDFCF8;
      --fg: #2C2C24;
      --primary: #4A7FB5;
      --primary-fg: #FFFFFF;
      --secondary: #E8B84B;
      --secondary-fg: #FFFFFF;
      --accent: #E6DCCD;
      --accent-fg: #4A4A40;
      --muted: #F0EBE5;
      --muted-fg: #78786C;
      --border: #DED8CF;
      --destructive: #D4726A;
      --card-bg: #FEFEFA;
      --shadow-soft: 0 4px 20px -2px rgba(74, 127, 181, 0.15);
      --shadow-float: 0 10px 40px -10px rgba(232, 184, 75, 0.2);
    }

    body {
      font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow: hidden;
    }

    /* 纸质纹理 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: multiply;
      opacity: 0.5;
    }

    /* 主容器 */
    .login-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 左侧品牌区 */
    .brand-panel {
      flex: 0 0 60%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 有机blob装饰 */
    .blob {
      position: absolute;
      border-radius: inherit;
      pointer-events: none;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      background: var(--primary);
      filter: blur(100px);
      opacity: 0.08;
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      top: -40px;
      right: -60px;
    }

    .blob-2 {
      width: 250px;
      height: 250px;
      background: var(--secondary);
      filter: blur(80px);
      opacity: 0.06;
      border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
      bottom: -30px;
      left: -50px;
    }

    .blob-3 {
      width: 200px;
      height: 200px;
      background: var(--accent);
      filter: blur(60px);
      opacity: 0.05;
      border-radius: 50% 50% 40% 60% / 50% 40% 60% 50%;
      top: 50%;
      right: 15%;
      transform: translateY(-50%);
    }

    /* 品牌内容 */
    .brand-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .brand-content img {
      height: 100px;
      width: auto;
      display: block;
    }

    .brand-name {
      font-family: 'Fraunces', serif;
      font-weight: 800;
      font-size: 42px;
      color: var(--fg);
      margin-top: 8px;
      letter-spacing: 2px;
    }

    .brand-subtitle {
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      font-size: 16px;
      color: var(--muted-fg);
      margin-top: -4px;
    }

    /* 底部服务特点 */
    .features {
      display: flex;
      gap: 40px;
      margin-top: 48px;
    }

    .feature-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .feature-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(74, 127, 181, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .feature-icon:hover {
      background: rgba(74, 127, 181, 0.18);
      transform: translateY(-2px);
    }

    .feature-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--primary);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feature-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--fg);
    }

    .feature-desc {
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      font-size: 11px;
      color: var(--muted-fg);
    }

    /* 右侧登录区 */
    .login-panel {
      flex: 0 0 40%;
      background: var(--card-bg);
      border-left: 1px solid rgba(222, 216, 207, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .login-card {
      max-width: 400px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--fg);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: var(--muted-fg);
      margin-bottom: 36px;
    }

    /* 输入框 */
    .input-group {
      width: 100%;
      position: relative;
      margin-bottom: 16px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }

    .input-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--primary);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .input-field {
      width: 100%;
      height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(222, 216, 207, 0.8);
      background: rgba(255, 255, 255, 0.5);
      padding: 0 20px 0 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--fg);
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field::placeholder {
      color: var(--muted-fg);
      opacity: 0.7;
    }

    .input-field:focus {
      box-shadow: 0 0 0 2px rgba(74, 127, 181, 0.3);
      border-color: rgba(74, 127, 181, 0.4);
      background: rgba(255, 255, 255, 0.7);
    }

    .input-field.password-field {
      padding-right: 50px;
    }

    .toggle-password {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
      stroke: var(--muted-fg);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
    }

    .toggle-password:hover svg {
      stroke: var(--primary);
    }

    /* 记住我 & 忘记密码 */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 28px;
      margin-top: 4px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .custom-checkbox {
      display: none;
    }

    .checkbox-visual {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .checkbox-visual svg {
      width: 12px;
      height: 12px;
      stroke: var(--primary-fg);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s ease;
    }

    .custom-checkbox:checked + .checkbox-visual {
      background: var(--primary);
      border-color: var(--primary);
    }

    .custom-checkbox:checked + .checkbox-visual svg {
      opacity: 1;
      transform: scale(1);
    }

    .remember-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 500;
      font-size: 13px;
      color: var(--muted-fg);
    }

    .forgot-link {
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--secondary);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-link:hover {
      color: #c9a030;
    }

    /* 登录按钮 */
    .login-btn {
      width: 100%;
      height: 52px;
      border-radius: 999px;
      border: none;
      background: var(--primary);
      color: var(--primary-fg);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-soft);
      letter-spacing: 0.5px;
    }

    .login-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px -2px rgba(74, 127, 181, 0.25);
    }

    .login-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 12px -2px rgba(74, 127, 181, 0.2);
    }

    /* 版权 */
    .copyright {
      position: absolute;
      bottom: 24px;
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      font-size: 11px;
      color: var(--muted-fg);
      text-align: center;
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .login-container {
        flex-direction: column;
      }

      .brand-panel {
        flex: 0 0 auto;
        padding: 40px 20px 32px;
      }

      .brand-name {
        font-size: 32px;
      }

      .features {
        gap: 24px;
        margin-top: 32px;
      }

      .feature-icon {
        width: 48px;
        height: 48px;
      }

      .feature-icon svg {
        width: 20px;
        height: 20px;
      }

      .login-panel {
        flex: 1;
        border-left: none;
        border-top: 1px solid rgba(222, 216, 207, 0.5);
      }

      .login-card {
        max-width: 360px;
      }
    }

    @media (max-width: 480px) {
      .features {
        gap: 16px;
      }

      .feature-desc {
        display: none;
      }

      .brand-name {
        font-size: 28px;
      }

      .brand-subtitle {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- 左侧品牌区 -->
    <div class="brand-panel">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>

      <div class="brand-content">
        <img src="../assets/logo.png" alt="乐修匠Logo">
        <h1 class="brand-name">乐修匠</h1>
        <p class="brand-subtitle">专业社区维修服务平台</p>

        <div class="features">
          <!-- 专业维修 -->
          <div class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
              </svg>
            </div>
            <span class="feature-title">专业维修</span>
            <span class="feature-desc">持证上岗</span>
          </div>

          <!-- 快速响应 -->
          <div class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <span class="feature-title">快速响应</span>
            <span class="feature-desc">30分钟上门</span>
          </div>

          <!-- 品质保障 -->
          <div class="feature-item">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
              </svg>
            </div>
            <span class="feature-title">品质保障</span>
            <span class="feature-desc">售后无忧</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧登录区 -->
    <div class="login-panel">
      <div class="login-card">
        <h2 class="login-title">欢迎回来</h2>
        <p class="login-subtitle">请输入您的账号信息</p>

        <form id="loginForm" autocomplete="off">
          <!-- 用户名 -->
          <div class="input-group">
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input type="text" class="input-field" placeholder="请输入用户名" id="username">
            </div>
          </div>

          <!-- 密码 -->
          <div class="input-group">
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" class="input-field password-field" placeholder="请输入密码" id="password">
              <button type="button" class="toggle-password" id="togglePassword" aria-label="切换密码可见性">
                <!-- eye icon -->
                <svg viewBox="0 0 24 24" id="eyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <!-- eye-off icon (hidden) -->
                <svg viewBox="0 0 24 24" id="eyeOffIcon" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- 记住我 & 忘记密码 -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" class="custom-checkbox" id="rememberMe">
              <span class="checkbox-visual">
                <svg viewBox="0 0 24 24">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </span>
              <span class="remember-text">记住我</span>
            </label>
            <a href="#" class="forgot-link">忘记密码?</a>
          </div>

          <!-- 登录按钮 -->
          <button type="submit" class="login-btn">登 录</button>
        </form>
      </div>

      <div class="copyright">&copy; 2026 乐修匠社区维修管理系统 版权所有</div>
    </div>
  </div>

  <script>
    // 密码显示/隐藏切换
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    toggleBtn.addEventListener('click', function () {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.style.display = isPassword ? 'none' : 'block';
      eyeOffIcon.style.display = isPassword ? 'block' : 'none';
    });

    // 表单提交（阻止默认行为，演示用）
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        // 简单的内联提示
        if (!username) {
          shakeInput(document.getElementById('username'));
        }
        if (!password) {
          shakeInput(document.getElementById('password'));
        }
        return;
      }

      // 登录按钮加载状态
      const btn = document.querySelector('.login-btn');
      btn.textContent = '登录中...';
      btn.style.opacity = '0.8';
      btn.disabled = true;

      setTimeout(function () {
        btn.textContent = '登 录';
        btn.style.opacity = '1';
        btn.disabled = false;
      }, 1500);
    });

    // 输入框抖动效果
    function shakeInput(el) {
      el.style.animation = 'none';
      el.offsetHeight; // trigger reflow
      el.style.animation = 'shake 0.4s ease';
      el.focus();
    }

    // 注入抖动动画
    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }
    `;
    document.head.appendChild(shakeStyle);
  </script>
</body>
</html>
