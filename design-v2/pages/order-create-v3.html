<html lang="zh-CN">
<head>

<title>新建工单 - 乐修匠社区维修管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCF8;
  --fg: #2C2C24;
  --primary: #4A7FB5;
  --primary-fg: #FFFFFF;
  --secondary: #E8B84B;
  --secondary-fg: #FFFFFF;
  --accent: #E6DCCD;
  --accent-fg: #4A4A40;
  --muted: #F0EBE5;
  --muted-fg: #78786C;
  --border: #DED8CF;
  --destructive: #D4726A;
  --card-bg: #FEFEFA;
  --shadow-soft: 0 4px 20px -2px rgba(74, 127, 181, 0.15);
  --shadow-float: 0 10px 40px -10px rgba(232, 184, 75, 0.2);
  --shadow-hover: 0 20px 40px -10px rgba(74, 127, 181, 0.15);
  --nav-width: 220px;
  --topbar-height: 56px;
  --font-display: 'Fraunces', 'PingFang SC', 'Microsoft YaHei', serif;
  --font-body: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
html, body {
  height: 100vh;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
/* ===== Paper Texture ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
  opacity: 0.5;
}
/* ===== Layout ===== */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}
/* ===== Left Sidebar ===== */
.sidebar {
  width: var(--nav-width);
  min-width: var(--nav-width);
  height: 100vh;
  background: rgba(253,252,248,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid rgba(222,216,207,0.5);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  z-index: 10;
  position: relative;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  margin-bottom: 8px;
}
.logo-img {
  height: 36px;
  width: auto;
  flex-shrink: 0;
}
.logo-text h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--fg);
  line-height: 1.2;
}
.logo-text p {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 11px;
  color: var(--muted-fg);
  margin-top: 2px;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
  margin: 0 12px;
  padding: 0 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: var(--muted-fg);
  font-size: 14px;
  font-weight: 500;
  position: relative;
}
.nav-item:hover {
  background: rgba(230,220,205,0.3);
}
.nav-item.active {
  background: rgba(74,127,181,0.1);
  color: var(--primary);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--primary);
}
.nav-item svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
  flex-shrink: 0;
}
.sidebar-footer {
  padding: 0 20px;
  font-size: 11px;
  color: var(--muted-fg);
  font-weight: 400;
  opacity: 0.7;
}
/* ===== Main Content ===== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}
.main-content::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: var(--primary);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  filter: blur(80px);
  opacity: 0.06;
  pointer-events: none;
  z-index: 0;
}
.main-content::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: -30px;
  width: 160px;
  height: 160px;
  background: var(--secondary);
  border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
  filter: blur(60px);
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
}
/* ===== Top Bar ===== */
.topbar {
  height: var(--topbar-height);
  min-height: var(--topbar-height);
  background: rgba(253,252,248,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(222,216,207,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: relative;
  z-index: 5;
}
.breadcrumb {
  font-size: 13px;
  color: var(--muted-fg);
  font-weight: 400;
}
.breadcrumb span { opacity: 0.5; }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.notification-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  transition: all 0.3s ease;
  position: relative;
}
.notification-btn:hover { background: rgba(74,127,181,0.08); }
.notification-btn .badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--destructive);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-body);
}
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
}
/* ===== Page Content Area ===== */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 20px;
  position: relative;
  z-index: 1;
}
.page-content::-webkit-scrollbar { width: 6px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== Page Header ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: var(--fg);
}
.btn-cancel {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 22px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted-fg);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
}
.btn-cancel:hover {
  border-color: var(--muted-fg);
  color: var(--fg);
  background: rgba(222,216,207,0.15);
}
.btn-cancel svg {
  width: 16px;
  height: 16px;
}

/* ===== Form Card ===== */
.form-card {
  background: var(--card-bg);
  border-radius: 24px;
  border: 1px solid rgba(222,216,207,0.4);
  box-shadow: var(--shadow-soft);
  padding: 32px;
  margin-bottom: 20px;
}

/* ===== Section Title ===== */
.section-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  color: var(--fg);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--primary);
  display: inline-block;
}

/* ===== Form Grid ===== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.form-grid .full-width {
  grid-column: 1 / -1;
}

/* ===== Form Field ===== */
.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-label {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  color: #5C5A4E;
}
.form-label .required {
  color: var(--destructive);
  margin-left: 2px;
}

/* ===== Input / Select ===== */
.form-input,
.form-select,
.form-textarea {
  width: 100%;
  height: 48px;
  padding: 0 20px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  color: var(--fg);
  outline: none;
  transition: all 0.25s ease;
  -webkit-appearance: none;
  appearance: none;
}
.form-input::placeholder,
.form-textarea::placeholder {
  color: var(--muted-fg);
  opacity: 0.6;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,127,181,0.15);
  background: rgba(255,255,255,0.75);
}
.form-select {
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2378786C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 18px center;
  padding-right: 44px;
  cursor: pointer;
}
.form-textarea {
  height: 100px;
  padding: 14px 20px;
  border-radius: 24px;
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}
.form-textarea.small {
  height: 80px;
  min-height: 60px;
}

/* ===== Section Divider ===== */
.section-divider {
  height: 1px;
  background: rgba(222,216,207,0.4);
  margin: 32px 0;
}

/* ===== Bottom Action Bar ===== */
.action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 4px;
}
.action-bar-left,
.action-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 999px;
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  white-space: nowrap;
}
.btn svg {
  width: 18px;
  height: 18px;
}
.btn-secondary {
  background: var(--muted);
  color: var(--accent-fg);
}
.btn-secondary:hover {
  background: var(--accent);
}
.btn-primary {
  background: var(--primary);
  color: var(--primary-fg);
  box-shadow: 0 4px 14px -2px rgba(74,127,181,0.35);
}
.btn-primary:hover {
  background: #3F6FA0;
  box-shadow: 0 6px 20px -2px rgba(74,127,181,0.4);
  transform: translateY(-1px);
}
.btn-primary:active {
  transform: translateY(0);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full-width { grid-column: 1; }
  .form-card { padding: 20px; }
  .page-content { padding: 16px; }
  .action-bar {
    flex-direction: column-reverse;
    gap: 12px;
  }
  .action-bar-left,
  .action-bar-right {
    width: 100%;
    justify-content: center;
  }
}
</style>
</head>

              <div style="margin-top:8px;font-size:12px;color:var(--muted-fg);">已自动填入客户信息，如需修改可直接编辑</div>
            </div>
            <!-- 未匹配到客户 -->
            <div id="matchNotFound" style="display:none;background:rgba(232,184,75,0.08);border-radius:12px;padding:12px 16px;border:1px solid rgba(232,184,75,0.2);">
              <span style="font-size:13px;font-weight:500;color:#9A7A1F;display:flex;align-items:center;gap:6px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                新客户 - 填写信息后将自动创建客户档案

            </div>
          </div>
          <div class="form-field">
            <label class="form-label">区域<span class="required">*</span></label>
            <select class="form-select">
              <option value="" disabled selected>请选择所在区域</option>
              <option value="xincheng">新城区</option>
              <option value="weiyang">未央区</option>
              <option value="gaoxin">高新区</option>
              <option value="baqiao">灞桥区</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">来源渠道</label>
            <select class="form-select">
              <option value="" disabled selected>请选择来源渠道</option>
              <option value="community">社区宣传</option>
              <option value="referral">客户推荐</option>
              <option value="online">线上推广</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div class="form-field full-width">
            <label class="form-label">详细住址<span class="required">*</span></label>
            <input type="text" class="form-input" placeholder="请输入详细地址，如：XX小区X栋X单元X号">
          </div>
        </div>

        <!-- Divider -->
        <div class="section-divider"></div>

        <!-- Section B: Request Info -->
        <div class="section-title">诉求信息</div>
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label">问题分类<span class="required">*</span></label>
            <select class="form-select">
              <option value="" disabled selected>请选择问题分类</option>
              <option value="plumbing">水电维修</option>
              <option value="drain">下水疏通</option>
              <option value="furniture">家具门窗</option>
              <option value="appliance-repair">家电维修</option>
              <option value="appliance-clean">家电清洗</option>
              <option value="waterproof">测漏防水</option>
              <option value="lock">开锁换锁</option>
              <option value="renovation">局部翻新</option>
            </select>
          </div>
          <div class="form-field">
            <!-- placeholder to keep grid alignment -->

          <div class="form-field full-width">
            <label class="form-label">问题描述<span class="required">*</span></label>
            <textarea class="form-textarea" placeholder="请详细描述客户遇到的问题，如：厨房水龙头漏水，已持续三天..."></textarea>

            保存为咨询单
          </button>
        </div>
        <div class="action-bar-right">
          <button class="btn btn-primary" onclick="handleSubmit()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            提交工单
          </button>
          <button class="btn btn-primary" onclick="handleSubmitAndDispatch()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>

          </button>
        </div>
      </div>

    </div><!-- /page-content -->

<script>
function handleSaveDraft() {
  alert('已保存为咨询单');
}
function handleSubmit() {
  alert('工单已提交');
}
function handleSubmitAndDispatch() {
  alert('工单已提交并进入派单流程');
}

// 客户匹配模拟
document.querySelectorAll('input[type="text"], input[type="tel"]').forEach(input => {
  if (input.placeholder && input.placeholder.includes('手机号')) {
    input.addEventListener('blur', function() {
      const match = document.getElementById('customerMatch');
      const found = document.getElementById('matchFound');
      const notFound = document.getElementById('matchNotFound');
      if (this.value.length >= 11) {
        match.style.display = 'block';
        // 模拟：手机号包含136则匹配到客户
        if (this.value.includes('136')) {
          found.style.display = 'block';
          notFound.style.display = 'none';
        } else {
          found.style.display = 'none';
          notFound.style.display = 'block';
        }
      } else {
        match.style.display = 'none';
      }
    });
  }
});
</script>
