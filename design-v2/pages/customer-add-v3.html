<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增客户 - 乐修匠社区维修管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCF8;
  --fg: #2C2C24;
  --primary: #4A7FB5;
  --primary-fg: #FFFFFF;
  --secondary: #E8B84B;
  --secondary-fg: #FFFFFF;
  --accent: #E6DCCD;
  --accent-fg: #4A4A40;
  --muted: #F0EBE5;
  --muted-fg: #78786C;
  --border: #DED8CF;
  --destructive: #D4726A;
  --card-bg: #FEFEFA;
  --shadow-soft: 0 4px 20px -2px rgba(74, 127, 181, 0.15);
  --shadow-float: 0 10px 40px -10px rgba(232, 184, 75, 0.2);
  --shadow-hover: 0 20px 40px -10px rgba(74, 127, 181, 0.15);
  --nav-width: 220px;
  --topbar-height: 56px;
  --font-display: 'Fraunces', 'PingFang SC', 'Microsoft YaHei', serif;
  --font-body: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
html, body {
  height: 100vh;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
/* ===== Paper Texture ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
  opacity: 0.5;
}
/* ===== Layout ===== */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}
/* ===== Left Sidebar ===== */
.sidebar {
  width: var(--nav-width);
  min-width: var(--nav-width);
  height: 100vh;
  background: rgba(253,252,248,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid rgba(222,216,207,0.5);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  z-index: 10;
  position: relative;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  margin-bottom: 8px;
}
.logo-img {
  height: 36px;
  width: auto;
  flex-shrink: 0;
}
.logo-text h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--fg);
  line-height: 1.2;
}
.logo-text p {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 11px;
  color: var(--muted-fg);
  margin-top: 2px;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
  margin: 0 12px;
  padding: 0 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: var(--muted-fg);
  font-size: 14px;
  font-weight: 500;
  position: relative;
}
.nav-item:hover {
  background: rgba(230,220,205,0.3);
}
.nav-item.active {
  background: rgba(74,127,181,0.1);
  color: var(--primary);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--primary);
}
.nav-item svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
  flex-shrink: 0;
}
.sidebar-footer {
  padding: 0 20px;
  font-size: 11px;
  color: var(--muted-fg);
  font-weight: 400;
  opacity: 0.7;
}
/* ===== Main Content ===== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}
.main-content::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: var(--primary);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  filter: blur(80px);
  opacity: 0.06;
  pointer-events: none;
  z-index: 0;
}
.main-content::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: -30px;
  width: 160px;
  height: 160px;
  background: var(--secondary);
  border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
  filter: blur(60px);
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
}
/* ===== Top Bar ===== */
.topbar {
  height: var(--topbar-height);
  min-height: var(--topbar-height);
  background: rgba(253,252,248,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(222,216,207,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: relative;
  z-index: 5;
}
.breadcrumb {
  font-size: 13px;
  color: var(--muted-fg);
  font-weight: 400;
}
.breadcrumb span { opacity: 0.5; }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.notification-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  transition: all 0.3s ease;
  position: relative;
}
.notification-btn:hover { background: rgba(74,127,181,0.08); }
.notification-btn .badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--destructive);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-body);
}
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
}
/* ===== Page Content Area ===== */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 20px;
  position: relative;
  z-index: 1;
}
.page-content::-webkit-scrollbar { width: 6px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== Page Header ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: var(--fg);
}
.page-header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn-save {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 24px;
  border-radius: 999px;
  border: none;
  background: var(--primary);
  color: white;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 14px rgba(74,127,181,0.3);
}
.btn-save:hover {
  background: #3D6FA3;
  box-shadow: 0 6px 20px rgba(74,127,181,0.4);
  transform: translateY(-1px);
}
.btn-save:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(74,127,181,0.3);
}
.btn-save svg {
  width: 16px;
  height: 16px;
}
.btn-cancel {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 24px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted-fg);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-cancel:hover {
  border-color: var(--muted-fg);
  color: var(--fg);
  background: rgba(222,216,207,0.2);
}
.btn-cancel svg {
  width: 16px;
  height: 16px;
}

/* ===== Form Card ===== */
.form-card {
  background: var(--card-bg);
  border-radius: 24px 24px 20px 28px;
  border: 1px solid rgba(222,216,207,0.4);
  box-shadow: var(--shadow-soft);
  padding: 28px;
  margin-bottom: 20px;
}

/* ===== Section Title ===== */
.section-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  color: var(--fg);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--primary);
  display: inline-block;
}

/* ===== Form Grid ===== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 24px;
}
.form-grid .full-width {
  grid-column: 1 / -1;
}

/* ===== Form Field ===== */
.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-label {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 13px;
  color: #5C5A4E;
}
.form-label .required {
  color: var(--destructive);
  margin-left: 2px;
}

/* ===== Input / Select ===== */
.form-input,
.form-select {
  width: 100%;
  height: 48px;
  padding: 0 20px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  color: var(--fg);
  outline: none;
  transition: all 0.25s ease;
  -webkit-appearance: none;
  appearance: none;
}
.form-input::placeholder {
  color: var(--muted-fg);
  opacity: 0.6;
}
.form-input:focus,
.form-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,127,181,0.15);
  background: rgba(255,255,255,0.75);
}
.form-select {
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2378786C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 18px center;
  padding-right: 44px;
  cursor: pointer;
}

/* ===== Textarea ===== */
.form-textarea {
  width: 100%;
  min-height: 100px;
  padding: 14px 20px;
  border-radius: 24px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  color: var(--fg);
  outline: none;
  resize: vertical;
  transition: all 0.25s ease;
  line-height: 1.6;
}
.form-textarea::placeholder {
  color: var(--muted-fg);
  opacity: 0.6;
}
.form-textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,127,181,0.15);
  background: rgba(255,255,255,0.75);
}

/* ===== Customer Match Hint ===== */
.match-container {
  display: none;
  margin-top: 4px;
}
.match-container.show {
  display: block;
}
.match-found {
  background: rgba(74,127,181,0.08);
  border-radius: 16px;
  padding: 14px 18px;
  border: 1px solid rgba(74,127,181,0.2);
  animation: fadeIn 0.3s ease;
}
.match-found-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.match-found-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.match-found-title svg {
  width: 14px;
  height: 14px;
}
.match-badge {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 999px;
  background: rgba(232,184,75,0.15);
  color: #B8922E;
  font-weight: 600;
}
.match-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  font-size: 12px;
  color: var(--muted-fg);
}
.match-info-grid strong {
  color: var(--fg);
}
.match-info-grid .full-span {
  grid-column: 1 / -1;
}
.match-tags {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.match-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(230,220,205,0.4);
  color: var(--accent-fg);
}
.match-remark {
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted-fg);
  font-style: italic;
}
.match-hint {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted-fg);
}
.match-not-found {
  background: rgba(232,184,75,0.08);
  border-radius: 16px;
  padding: 14px 18px;
  border: 1px solid rgba(232,184,75,0.2);
  animation: fadeIn 0.3s ease;
}
.match-not-found-text {
  font-size: 13px;
  font-weight: 500;
  color: #9A7A1F;
  display: flex;
  align-items: center;
  gap: 6px;
}
.match-not-found-text svg {
  width: 14px;
  height: 14px;
}

/* ===== Tag Management Card ===== */
.tag-card {
  background: var(--card-bg);
  border-radius: 20px 28px 24px 24px;
  border: 1px solid rgba(222,216,207,0.4);
  box-shadow: var(--shadow-soft);
  padding: 28px;
  margin-bottom: 20px;
}
.tag-section-label {
  font-size: 13px;
  font-weight: 600;
  color: #5C5A4E;
  margin-bottom: 10px;
}
.tag-current-area {
  min-height: 44px;
  background: rgba(240,235,229,0.3);
  border-radius: 16px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.tag-empty-hint {
  font-size: 13px;
  color: var(--muted-fg);
  opacity: 0.6;
  font-style: italic;
}
.tag-active {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 999px;
  background: var(--primary);
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: default;
  animation: tagPop 0.25s ease;
}
.tag-active .tag-remove {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: background 0.2s ease;
}
.tag-active .tag-remove:hover {
  background: rgba(255,255,255,0.5);
}
.tag-active .tag-remove svg {
  width: 10px;
  height: 10px;
}
.tag-available-area {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.tag-available {
  padding: 5px 14px;
  border-radius: 999px;
  background: var(--muted);
  color: var(--muted-fg);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.25s ease;
}
.tag-available:hover {
  background: rgba(74,127,181,0.1);
  color: var(--primary);
  border-color: rgba(74,127,181,0.2);
}
.tag-available.used {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  cursor: default;
}
.tag-add-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1.5px dashed var(--border);
  background: transparent;
  color: var(--muted-fg);
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font-body);
}
.tag-add-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(74,127,181,0.05);
}
.tag-custom-input {
  display: none;
  align-items: center;
  gap: 6px;
}
.tag-custom-input.show {
  display: inline-flex;
}
.tag-custom-input input {
  height: 32px;
  padding: 0 14px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg);
  outline: none;
  transition: all 0.25s ease;
  width: 120px;
}
.tag-custom-input input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(74,127,181,0.15);
}
.tag-custom-confirm {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
}
.tag-custom-confirm:hover {
  background: #3D6FA3;
}
.tag-custom-confirm svg {
  width: 14px;
  height: 14px;
}

/* ===== Animations ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes tagPop {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full-width { grid-column: 1; }
  .form-card, .tag-card { padding: 20px; }
  .page-content { padding: 16px; }
  .page-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
}
</style>
</head>

<div class="app-layout">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img class="logo-img" src="../assets/logo.png" alt="乐修匠">
      <div class="logo-text">
        <h1>乐修匠</h1>
        <p>社区维修管理系统</p>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item">

        <span>工单管理</span>
      </a>

        <span>客户管理</span>

  <!-- ===== Main Content ===== -->
  <div class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="breadcrumb">首页 <span>/</span> 客户管理 <span>/</span> 新增客户</div>
      <div class="topbar-right">
        <button class="notification-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>

    </header>

    <!-- Page Content -->
    <div class="page-content">

      <!-- Page Header -->
      <div class="page-header">
        <h2 class="page-title">新增客户</h2>
        <div class="page-header-actions">
          <button class="btn-save" onclick="handleSave()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            保存
          </button>
          <button class="btn-cancel" onclick="handleCancel()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            取消
          </button>
        </div>
      </div>

      <!-- ===== Card 1: Basic Info ===== -->
      <div class="form-card">
        <div class="section-title">基本信息</div>
        <div class="form-grid">

          <!-- Row 1: Name & Phone -->
          <div class="form-field">
            <label class="form-label">姓名<span class="required">*</span></label>
            <input type="text" class="form-input" id="custName" placeholder="请输入客户姓名" maxlength="20">
          </div>
          <div class="form-field">
            <label class="form-label">联系方式<span class="required">*</span></label>
            <input type="tel" class="form-input" id="custPhone" placeholder="请输入手机号" maxlength="11" pattern="[0-9]*" oninput="this.value=this.value.replace(/\D/g,'')">
            <!-- Phone match hint -->
            <div class="match-container" id="customerMatch">
              <div class="match-found" id="matchFound" style="display:none;">
                <div class="match-found-header">
                  <span class="match-found-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    已匹配到客户档案
                  </span>
                  <span class="match-badge" id="matchLevel">VIP客户</span>
                </div>
                <div class="match-info-grid">
                  <span>姓名：<strong id="matchName">王五</strong></span>
                  <span>区域：<strong id="matchArea">未央区</strong></span>
                  <span class="full-span">地址：<strong id="matchAddr">凤城花园6号楼3单元501</strong></span>
                </div>
                <div class="match-tags" id="matchTags">
                  <span class="match-tag">某小区业主</span>
                  <span class="match-tag">周末预约</span>
                </div>
                <div class="match-remark" id="matchRemark">备注：老人独居，需耐心沟通；只接受周末上门</div>
                <div class="match-hint">该手机号已注册，请确认是否为同一客户</div>
              </div>
              <div class="match-not-found" id="matchNotFound" style="display:none;">
                <span class="match-not-found-text">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  新客户 - 该手机号未在系统中注册
                </span>
              </div>
            </div>
          </div>

          <!-- Row 2: Area & Address -->
          <div class="form-field">
            <label class="form-label">区域<span class="required">*</span></label>
            <select class="form-select" id="custArea">
              <option value="" disabled selected>请选择区域</option>
              <option value="新城区">新城区</option>
              <option value="未央区">未央区</option>
              <option value="高新区">高新区</option>
              <option value="灞桥区">灞桥区</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">详细地址<span class="required">*</span></label>
            <input type="text" class="form-input" id="custAddress" placeholder="请输入详细地址">
          </div>

          <!-- Row 3: Level & Source -->
          <div class="form-field">
            <label class="form-label">客户等级<span class="required">*</span></label>
            <select class="form-select" id="custLevel">
              <option value="普通客户" selected>普通客户</option>
              <option value="VIP客户">VIP客户</option>
              <option value="黑名单">黑名单</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">来源渠道</label>
            <select class="form-select" id="custSource">
              <option value="" disabled selected>请选择来源渠道</option>
              <option value="社区宣传">社区宣传</option>
              <option value="客户推荐">客户推荐</option>
              <option value="电话咨询">电话咨询</option>
              <option value="线上推广">线上推广</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <!-- Row 4: Remark (full width) -->
          <div class="form-field full-width">
            <label class="form-label">备注/偏好</label>
            <textarea class="form-textarea" id="custRemark" placeholder="客户特殊偏好、注意事项等，如：老人独居需耐心沟通、只接受周末上门..." rows="3"></textarea>
          </div>

        </div>
      </div>

      <!-- ===== Card 2: Tag Management ===== -->
      <div class="tag-card">
        <div class="section-title">客户标签</div>

        <!-- Current tags -->
        <div class="tag-section-label">当前标签</div>
        <div class="tag-current-area" id="tagCurrentArea">
          <span class="tag-empty-hint" id="tagEmptyHint">暂无标签</span>
        </div>

        <!-- Available tags -->
        <div class="tag-section-label">可用标签</div>
        <div class="tag-available-area" id="tagAvailableArea">
          <span class="tag-available" data-tag="某小区业主" onclick="toggleTag(this)">某小区业主</span>
          <span class="tag-available" data-tag="价格敏感" onclick="toggleTag(this)">价格敏感</span>
          <span class="tag-available" data-tag="周末预约" onclick="toggleTag(this)">周末预约</span>
          <span class="tag-available" data-tag="老人家庭" onclick="toggleTag(this)">老人家庭</span>
          <span class="tag-available" data-tag="新客户" onclick="toggleTag(this)">新客户</span>
          <span class="tag-available" data-tag="回头客" onclick="toggleTag(this)">回头客</span>
          <button class="tag-add-btn" id="tagAddBtn" onclick="showCustomTagInput()" title="自定义标签">+</button>
          <div class="tag-custom-input" id="tagCustomInput">
            <input type="text" id="tagCustomField" placeholder="输入标签名" maxlength="10" onkeydown="if(event.key==='Enter')confirmCustomTag()">
            <button class="tag-custom-confirm" onclick="confirmCustomTag()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div><!-- /page-content -->
  </div><!-- /main-content -->
</div><!-- /app-layout -->

<script>
// ===== Tag Management =====
let activeTags = [];

function toggleTag(el) {
  const tag = el.getAttribute('data-tag');
  if (activeTags.includes(tag)) {
    removeTag(tag);
  } else {
    addTag(tag);
  }
}

function addTag(tag) {
  if (activeTags.includes(tag)) return;
  activeTags.push(tag);
  renderTags();
}

function removeTag(tag) {
  activeTags = activeTags.filter(t => t !== tag);
  renderTags();
}

function renderTags() {
  const currentArea = document.getElementById('tagCurrentArea');
  const emptyHint = document.getElementById('tagEmptyHint');

  // Clear current area (keep empty hint)
  currentArea.querySelectorAll('.tag-active').forEach(el => el.remove());

  if (activeTags.length === 0) {
    emptyHint.style.display = 'inline';
  } else {
    emptyHint.style.display = 'none';
    activeTags.forEach(tag => {
      const pill = document.createElement('span');
      pill.className = 'tag-active';
      pill.innerHTML = tag + ' <span class="tag-remove" onclick="removeTag(\'' + tag.replace(/'/g, "\\'") + '\')"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></span>';
      currentArea.appendChild(pill);
    });
  }

  // Update available tags
  document.querySelectorAll('.tag-available').forEach(el => {
    const tag = el.getAttribute('data-tag');
    if (activeTags.includes(tag)) {
      el.classList.add('used');
    } else {
      el.classList.remove('used');
    }
  });
}

// Custom tag input
function showCustomTagInput() {
  document.getElementById('tagAddBtn').style.display = 'none';
  const input = document.getElementById('tagCustomInput');
  input.classList.add('show');
  document.getElementById('tagCustomField').focus();
}

function confirmCustomTag() {
  const field = document.getElementById('tagCustomField');
  const val = field.value.trim();
  if (!val) {
    hideCustomTagInput();
    return;
  }
  // Check if already exists (in available or active)
  const existing = document.querySelector('.tag-available[data-tag="' + val + '"]');
  if (existing) {
    if (!activeTags.includes(val)) {
      addTag(val);
    }
  } else {
    // Create new available tag
    const newTag = document.createElement('span');
    newTag.className = 'tag-available';
    newTag.setAttribute('data-tag', val);
    newTag.textContent = val;
    newTag.onclick = function() { toggleTag(this); };
    document.getElementById('tagAvailableArea').insertBefore(newTag, document.getElementById('tagAddBtn'));
    addTag(val);
  }
  field.value = '';
  hideCustomTagInput();
}

function hideCustomTagInput() {
  document.getElementById('tagCustomInput').classList.remove('show');
  document.getElementById('tagAddBtn').style.display = 'inline-flex';
}

// ===== Phone Match Simulation =====
const mockCustomers = [
  { phone: '13612345678', name: '王五', area: '未央区', address: '凤城花园6号楼3单元501', level: 'VIP客户', tags: ['某小区业主', '周末预约'], remark: '老人独居，需耐心沟通；只接受周末上门' },
  { phone: '13898765432', name: '李明', area: '高新区', address: '紫薇田园都市E区8栋201', level: '普通客户', tags: ['价格敏感'], remark: '对价格比较敏感，提前报价' },
  { phone: '15011112222', name: '张阿姨', area: '新城区', address: '幸福小区3号楼1单元302', level: 'VIP客户', tags: ['老人家庭', '回头客'], remark: '老客户，每次都指定李师傅' }
];

document.getElementById('custPhone').addEventListener('blur', function() {
  const matchContainer = document.getElementById('customerMatch');
  const matchFound = document.getElementById('matchFound');
  const matchNotFound = document.getElementById('matchNotFound');
  const phone = this.value.trim();

  if (phone.length < 11) {
    matchContainer.classList.remove('show');
    return;
  }

  const customer = mockCustomers.find(c => c.phone === phone);

  matchContainer.classList.add('show');

  if (customer) {
    matchFound.style.display = 'block';
    matchNotFound.style.display = 'none';
    document.getElementById('matchName').textContent = customer.name;
    document.getElementById('matchArea').textContent = customer.area;
    document.getElementById('matchAddr').textContent = customer.address;
    document.getElementById('matchLevel').textContent = customer.level;
    document.getElementById('matchRemark').textContent = '备注：' + customer.remark;
    // Render tags
    const tagsContainer = document.getElementById('matchTags');
    tagsContainer.innerHTML = '';
    customer.tags.forEach(t => {
      const span = document.createElement('span');
      span.className = 'match-tag';
      span.textContent = t;
      tagsContainer.appendChild(span);
    });
  } else {
    matchFound.style.display = 'none';
    matchNotFound.style.display = 'block';
  }
});

// ===== Save Handler =====
function handleSave() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const area = document.getElementById('custArea').value;
  const address = document.getElementById('custAddress').value.trim();
  const level = document.getElementById('custLevel').value;
  const source = document.getElementById('custSource').value;
  const remark = document.getElementById('custRemark').value.trim();

  // Validation
  if (!name) { showToast('请输入客户姓名'); return; }
  if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的手机号'); return; }
  if (!area) { showToast('请选择区域'); return; }
  if (!address) { showToast('请输入详细地址'); return; }

  const data = { name, phone, area, address, level, source, remark, tags: activeTags };
  console.log('Saving customer:', data);
  showToast('客户信息保存成功');
}

function handleCancel() {
  if (confirm('确定要取消吗？未保存的信息将丢失。')) {
    history.back();
  }
}

// ===== Toast =====
function showToast(message) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.textContent = message;
  Object.assign(toast.style, {
    position: 'fixed',
    top: '24px',
    left: '50%',
    transform: 'translateX(-50%)',
    padding: '12px 28px',
    borderRadius: '999px',
    background: 'var(--fg)',
    color: 'white',
    fontFamily: 'var(--font-body)',
    fontSize: '14px',
    fontWeight: '600',
    boxShadow: '0 8px 30px rgba(0,0,0,0.15)',
    zIndex: '10000',
    opacity: '0',
    transition: 'opacity 0.3s ease'
  });
  document.body.appendChild(toast);
  requestAnimationFrame(() => { toast.style.opacity = '1'; });
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
</script>
