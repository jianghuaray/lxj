<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回访管理 - 乐修匠社区维修管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCF8;
  --fg: #2C2C24;
  --primary: #4A7FB5;
  --primary-fg: #FFFFFF;
  --secondary: #E8B84B;
  --secondary-fg: #FFFFFF;
  --accent: #E6DCCD;
  --accent-fg: #4A4A40;
  --muted: #F0EBE5;
  --muted-fg: #78786C;
  --border: #DED8CF;
  --destructive: #D4726A;
  --card-bg: #FEFEFA;
  --shadow-soft: 0 4px 20px -2px rgba(74, 127, 181, 0.15);
  --shadow-float: 0 10px 40px -10px rgba(232, 184, 75, 0.2);
  --shadow-hover: 0 20px 40px -10px rgba(74, 127, 181, 0.15);
  --nav-width: 220px;
  --topbar-height: 56px;
  --font-display: 'Fraunces', 'PingFang SC', 'Microsoft YaHei', serif;
  --font-body: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
html, body {
  height: 100vh;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
/* ===== Paper Texture (Critical!) ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
  opacity: 0.5;
}
/* ===== Layout ===== */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100vw;
}
/* ===== Left Sidebar ===== */
.sidebar {
  width: var(--nav-width);
  min-width: var(--nav-width);
  height: 100vh;
  background: rgba(253,252,248,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid rgba(222,216,207,0.5);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  z-index: 10;
  position: relative;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  margin-bottom: 8px;
}
.logo-img {
  height: 36px;
  width: auto;
  flex-shrink: 0;
}
.logo-text h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--fg);
  line-height: 1.2;
}
.logo-text p {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 11px;
  color: var(--muted-fg);
  margin-top: 2px;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
  margin: 0 12px;
  padding: 0 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: var(--muted-fg);
  font-size: 14px;
  font-weight: 500;
  position: relative;
}
.nav-item:hover {
  background: rgba(230,220,205,0.3);
}
.nav-item.active {
  background: rgba(74,127,181,0.1);
  color: var(--primary);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--primary);
}
.nav-item svg {
  width: 20px;
  height: 20px;
  stroke-width: 2;
  flex-shrink: 0;
}
.sidebar-footer {
  padding: 0 20px;
  font-size: 11px;
  color: var(--muted-fg);
  font-weight: 400;
  opacity: 0.7;
}
/* ===== Main Content ===== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}
/* Background blobs */
.main-content::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: var(--primary);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  filter: blur(80px);
  opacity: 0.06;
  pointer-events: none;
  z-index: 0;
}
.main-content::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: -30px;
  width: 160px;
  height: 160px;
  background: var(--secondary);
  border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
  filter: blur(60px);
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
}
/* ===== Top Bar ===== */
.topbar {
  height: var(--topbar-height);
  min-height: var(--topbar-height);
  background: rgba(253,252,248,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(222,216,207,0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: relative;
  z-index: 5;
}
.breadcrumb {
  font-size: 13px;
  color: var(--muted-fg);
  font-weight: 400;
}
.breadcrumb span { opacity: 0.5; }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.notification-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  transition: all 0.3s ease;
  position: relative;
}
.notification-btn:hover { background: rgba(74,127,181,0.08); }
.notification-btn .badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--destructive);
}
.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-body);
}
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
}
/* ===== Page Content Area ===== */
.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 20px;
  position: relative;
  z-index: 1;
}
.page-content::-webkit-scrollbar { width: 6px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
/* ===== Page Header ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: var(--fg);
}
/* ===== Stats Pills ===== */
.stats-pills {
  display: flex;
  align-items: center;
  gap: 10px;
}
.stat-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.3s ease;
  cursor: default;
}
.stat-pill .pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.stat-pill .pill-value {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
}
.stat-pill.blue {
  background: rgba(74,127,181,0.1);
  color: var(--primary);
}
.stat-pill.blue .pill-dot { background: var(--primary); }
.stat-pill.green {
  background: rgba(74,158,100,0.1);
  color: #4A9E64;
}
.stat-pill.green .pill-dot { background: #4A9E64; }
.stat-pill.red {
  background: rgba(212,114,106,0.1);
  color: var(--destructive);
}
.stat-pill.red .pill-dot { background: var(--destructive); }
/* ===== Filter Toolbar ===== */
.filter-toolbar {
  background: rgba(240,235,229,0.5);
  border-radius: 24px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.filter-input {
  flex: 1;
  height: 44px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  padding: 0 18px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg);
  outline: none;
  transition: all 0.3s ease;
}
.filter-input::placeholder { color: var(--muted-fg); opacity: 0.7; }
.filter-input:focus {
  box-shadow: 0 0 0 2px rgba(74,127,181,0.2);
  border-color: rgba(74,127,181,0.3);
  background: rgba(255,255,255,0.8);
}
.filter-select {
  height: 44px;
  border-radius: 999px;
  border: 1px solid rgba(222,216,207,0.8);
  background: rgba(255,255,255,0.5);
  padding: 0 16px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg);
  outline: none;
  cursor: pointer;
  transition: all 0.3s ease;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2378786C' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 36px;
}
.filter-select:focus {
  box-shadow: 0 0 0 2px rgba(74,127,181,0.2);
  border-color: rgba(74,127,181,0.3);
}
.btn-query {
  height: 44px;
  padding: 0 24px;
  border-radius: 999px;
  border: none;
  background: var(--primary);
  color: white;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  transition: all 0.3s ease;
  white-space: nowrap;
}
.btn-query:hover {
  transform: scale(1.05);
  box-shadow: var(--shadow-hover);
}
.btn-query:active { transform: scale(0.95); }
.btn-reset {
  height: 44px;
  padding: 0 20px;
  border-radius: 999px;
  border: 2px solid var(--secondary);
  background: transparent;
  color: var(--secondary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.btn-reset:hover {
  background: rgba(232,184,75,0.08);
  transform: scale(1.05);
}
.btn-reset:active { transform: scale(0.95); }
.btn-export {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 44px;
  padding: 0 20px;
  border-radius: 999px;
  border: 2px solid var(--secondary);
  background: transparent;
  color: var(--secondary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.btn-export:hover {
  background: rgba(232,184,75,0.08);
  transform: scale(1.05);
}
.btn-export:active { transform: scale(0.95); }
/* ===== Data Table ===== */
.table-container {
  background: var(--card-bg);
  border: 1px solid rgba(222,216,207,0.5);
  border-radius: 24px;
  box-shadow: var(--shadow-soft);
  overflow: hidden;
  margin-bottom: 16px;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
.data-table thead th {
  padding: 14px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted-fg);
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: transparent;
}
.data-table thead th:first-child { padding-left: 24px; }
.data-table thead th:last-child { padding-right: 24px; text-align: center; }
.data-table tbody tr {
  height: 48px;
  transition: background 0.3s ease;
}
.data-table tbody tr:hover { background: rgba(240,235,229,0.4); }
.data-table tbody tr.overdue { background: rgba(212,114,106,0.06); }
.data-table tbody tr.overdue:hover { background: rgba(212,114,106,0.1); }
.data-table tbody td {
  padding: 0 16px;
  font-size: 13px;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.data-table tbody td:first-child { padding-left: 24px; }
.data-table tbody td:last-child { padding-right: 24px; text-align: center; }
.order-id { font-weight: 600; color: var(--primary); cursor: pointer; }
.order-id:hover { text-decoration: underline; }
/* Status badges */
.status-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.status-badge.pending { background: rgba(74,127,181,0.12); color: #4A7FB5; }
.status-badge.done { background: rgba(74,158,100,0.12); color: #4A9E64; }
.status-badge.skip { background: rgba(120,120,108,0.1); color: #78786C; }
/* Overdue day badge */
.day-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.day-badge.normal { background: rgba(74,127,181,0.08); color: var(--muted-fg); }
.day-badge.warn { background: rgba(232,184,75,0.12); color: #B8922E; }
.day-badge.danger { background: rgba(212,114,106,0.1); color: var(--destructive); }
/* Action buttons */
.action-btn {
  background: none;
  border: none;
  color: var(--primary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  transition: all 0.3s ease;
}
.action-btn:hover { background: rgba(74,127,181,0.08); color: #3D6A9A; }
.action-btn + .action-btn { margin-left: 4px; }
.action-btn.gray { color: var(--muted-fg); }
.action-btn.gray:hover { background: rgba(120,120,108,0.08); color: var(--fg); }
.action-btn.primary-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 14px;
  border-radius: 999px;
  background: rgba(74,127,181,0.12);
  color: var(--primary);
  font-weight: 600;
  font-size: 12px;
}
.action-btn.primary-pill:hover {
  background: var(--primary);
  color: white;
  box-shadow: var(--shadow-soft);
}
.action-btn.primary-pill svg { width: 14px; height: 14px; stroke-width: 2; }
/* ===== Pagination ===== */
.pagination-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}
.pagination-info {
  font-size: 13px;
  color: var(--muted-fg);
}
.pagination-info select {
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--muted-fg);
  cursor: pointer;
  outline: none;
}
.pagination-buttons {
  display: flex;
  align-items: center;
  gap: 6px;
}
.page-btn {
  min-width: 36px;
  height: 36px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--muted-fg);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}
.page-btn:hover { background: rgba(230,220,205,0.4); }
.page-btn.active {
  background: var(--primary);
  color: white;
  box-shadow: var(--shadow-soft);
}
.page-btn.nav-arrow { padding: 0 10px; }
.page-btn svg { width: 16px; height: 16px; stroke-width: 2; }
</style>
</head>

  <!-- ===== Main Content ===== -->

    <!-- Top Bar -->

      <div class="breadcrumb">首页 <span>/</span> 回访管理</div>
      <div class="topbar-right">

          <div class="stat-pill blue">

          </div>
          <div class="stat-pill green">

          <div class="stat-pill red">

      <!-- Filter Toolbar -->

        <input class="filter-input" type="date" style="width:160px;flex:none" value="2026-04-01">

        <select class="filter-select" id="statusFilter">

<script>
// ===== Sample Data =====
const callbacks = [
  { id:'202604250012', customer:'王五', phone:'138****6721', category:'水电维修', completedTime:'2026-04-25 16:30', days:5, status:'pending' },
  { id:'202604240008', customer:'赵六', phone:'139****3345', category:'下水疏通', completedTime:'2026-04-24 14:20', days:6, status:'pending' },
  { id:'202604230015', customer:'钱七', phone:'137****8890', category:'家电维修', completedTime:'2026-04-23 11:00', days:7, status:'done' },
  { id:'202604220003', customer:'孙八', phone:'136****2217', category:'家具门窗', completedTime:'2026-04-22 17:45', days:8, status:'pending' },
  { id:'202604210019', customer:'周九', phone:'135****5543', category:'水电维修', completedTime:'2026-04-21 09:30', days:9, status:'pending' },
  { id:'202604200006', customer:'吴十', phone:'158****7762', category:'下水疏通', completedTime:'2026-04-20 15:10', days:10, status:'done' },
  { id:'202604190011', customer:'郑十一', phone:'159****0098', category:'家电维修', completedTime:'2026-04-19 13:25', days:11, status:'skip' },
  { id:'202604180004', customer:'冯十二', phone:'186****4431', category:'家具门窗', completedTime:'2026-04-18 10:50', days:12, status:'pending' },
];

const statusMap = {
  'pending': { label: '待回访', cls: 'pending' },
  'done': { label: '已回访', cls: 'done' },
  'skip': { label: '无需回访', cls: 'skip' },
};

function getDayBadge(days) {
  if (days > 3) return `<span class="day-badge danger">${days}天</span>`;
  if (days === 3) return `<span class="day-badge warn">${days}天</span>`;
  return `<span class="day-badge normal">${days}天</span>`;
}

function renderTable() {
  const tbody = document.getElementById('callbackTableBody');
  tbody.innerHTML = callbacks.map(o => {
    const isOverdue = o.days > 3;
    const rowCls = isOverdue ? ' class="overdue"' : '';
    const s = statusMap[o.status];
    let actions = '';
    if (o.status === 'pending') {
      actions = `
        <button class="action-btn primary-pill" onclick="doCallback('${o.id}')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          执行回访
        </button>
        <button class="action-btn gray" onclick="skipCallback('${o.id}')">无需回访</button>`;
    } else if (o.status === 'done') {
      actions = `<button class="action-btn" onclick="viewCallback('${o.id}')">查看</button>`;
    } else {
      actions = `<button class="action-btn gray" onclick="viewCallback('${o.id}')">查看</button>`;
    }
    return `<tr${rowCls}>
      <td><span class="order-id">${o.id}</span></td>
      <td>${o.customer}</td>
      <td>${o.phone}</td>
      <td>${o.category}</td>
      <td>${o.completedTime}</td>
      <td>${getDayBadge(o.days)}</td>
      <td><span class="status-badge ${s.cls}">${s.label}</span></td>
      <td>${actions}</td>
    </tr>`;
  }).join('');
}

function doCallback(id) { console.log('执行回访:', id); }
function skipCallback(id) { console.log('标记无需回访:', id); }
function viewCallback(id) { console.log('查看回访详情:', id); }

// Tab switching for status filter
document.getElementById('statusFilter').addEventListener('change', function() {
  console.log('筛选状态:', this.value);
});

// Init
renderTable();
</script>
</body>
</html>
