<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>确认删除弹窗 - 乐修匠社区维修管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCF8;
  --fg: #3D3D35;
  --primary: #4A7FB5;
  --secondary: #E8B84B;
  --destructive: #D4726A;
  --destructive-hover: #C4635B;
  --muted-fg: #78786C;
  --border: #DED8CF;
  --card-bg: #FEFEFA;
  --shadow-soft: 0 4px 20px -2px rgba(74, 127, 181, 0.15);
  --shadow-hover: 0 20px 40px -10px rgba(74, 127, 181, 0.15);
  --font-display: 'Fraunces', 'PingFang SC', 'Microsoft YaHei', serif;
  --font-body: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
html, body {
  height: 100vh;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
  opacity: 0.5;
}

/* ===== Demo Layout ===== */
.demo-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 32px;
}
.demo-label {
  font-size: 13px;
  color: var(--muted-fg);
  font-weight: 500;
  margin-bottom: -16px;
}
.demo-triggers {
  display: flex;
  gap: 16px;
}
.demo-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  border-radius: 999px;
  border: none;
  background: var(--primary);
  color: white;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  transition: all 0.3s ease;
}
.demo-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
.demo-btn:active { transform: scale(0.95); }
.demo-btn.destructive {
  background: var(--destructive);
}
.demo-btn.outline {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--muted-fg);
  box-shadow: none;
}
.demo-btn.outline:hover { border-color: var(--destructive); color: var(--destructive); background: rgba(212,114,106,0.05); box-shadow: none; }

/* ===== Overlay ===== */
.dialog-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(44, 44, 36, 0.3);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
.dialog-overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ===== Dialog ===== */
.dialog {
  background: var(--card-bg);
  border: 1px solid rgba(222,216,207,0.5);
  border-radius: 24px 16px 24px 16px;
  box-shadow: 0 20px 60px -15px rgba(44, 44, 36, 0.2);
  padding: 32px;
  width: 420px;
  max-width: 90vw;
  transform: scale(0.9) translateY(10px);
  transition: all 0.3s ease;
}
.dialog-overlay.active .dialog {
  transform: scale(1) translateY(0);
}

/* Icon */
.dialog-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(212,114,106,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}
.dialog-icon svg {
  width: 28px;
  height: 28px;
  color: var(--destructive);
  stroke-width: 1.5;
}

/* Content */
.dialog-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  color: var(--fg);
  margin-bottom: 10px;
  line-height: 1.3;
}
.dialog-message {
  font-size: 14px;
  font-weight: 400;
  color: var(--muted-fg);
  line-height: 1.6;
  margin-bottom: 28px;
}
.dialog-message strong {
  color: var(--fg);
  font-weight: 600;
}

/* Warning box */
.dialog-warning {
  background: rgba(232,184,75,0.08);
  border: 1px solid rgba(232,184,75,0.2);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 24px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.dialog-warning svg {
  width: 18px;
  height: 18px;
  color: #B8922E;
  flex-shrink: 0;
  margin-top: 1px;
}
.dialog-warning p {
  font-size: 13px;
  color: #9A7A1F;
  line-height: 1.5;
}

/* Buttons */
.dialog-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
}
.btn-cancel {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 40px;
  padding: 0 24px;
  border-radius: 999px;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--muted-fg);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  min-width: 88px;
}
.btn-cancel:hover {
  border-color: var(--fg);
  color: var(--fg);
  background: rgba(61,61,53,0.04);
}
.btn-cancel:active { transform: scale(0.95); }

.btn-delete {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 40px;
  padding: 0 24px;
  border-radius: 999px;
  border: none;
  background: var(--destructive);
  color: white;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 16px -2px rgba(212,114,106,0.3);
  transition: all 0.3s ease;
  min-width: 88px;
}
.btn-delete:hover {
  background: var(--destructive-hover);
  box-shadow: 0 6px 20px -2px rgba(212,114,106,0.35);
  transform: translateY(-1px);
}
.btn-delete:active { transform: scale(0.95); }
.btn-delete svg { width: 16px; height: 16px; stroke-width: 2; }

/* ===== Close button (top right) ===== */
.dialog-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--muted-fg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}
.dialog-close:hover {
  background: rgba(222,216,207,0.4);
  color: var(--fg);
}
.dialog-close svg { width: 18px; height: 18px; stroke-width: 2; }

/* ===== Dialog wrapper for close btn positioning ===== */
.dialog-wrapper {
  position: relative;
}
</style>
</head>
<body>

<div class="demo-container">
  <span class="demo-label">点击按钮预览弹窗效果 ↓</span>
  <div class="demo-triggers">
    <button class="demo-btn destructive" onclick="openDialog('dialog1')">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      删除师傅
    </button>
    <button class="demo-btn outline" onclick="openDialog('dialog2')">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      删除工单
    </button>
  </div>
</div>

<!-- Dialog 1: 删除师傅（带警告） -->
<div class="dialog-overlay" id="dialog1" onclick="closeDialog('dialog1', event)">
  <div class="dialog-wrapper">
    <div class="dialog">
      <div class="dialog-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <div class="dialog-title">确认删除师傅</div>
      <div class="dialog-message">
        确定要删除师傅 <strong>韩胜涛</strong> 的信息吗？删除后该师傅的所有历史数据将无法恢复。
      </div>
      <div class="dialog-warning">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <p>该师傅名下有 <strong>32</strong> 条进行中的工单，删除后这些工单将变为"待派单"状态。</p>
      </div>
      <div class="dialog-actions">
        <button class="btn-cancel" onclick="closeDialog('dialog1')">取消</button>
        <button class="btn-delete" onclick="closeDialog('dialog1')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          确认删除
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Dialog 2: 删除工单（简洁版） -->
<div class="dialog-overlay" id="dialog2" onclick="closeDialog('dialog2', event)">
  <div class="dialog-wrapper">
    <div class="dialog">
      <div class="dialog-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <div class="dialog-title">确认删除工单</div>
      <div class="dialog-message">
        确定要删除工单 <strong>WO20260501001</strong> 吗？删除后数据将无法恢复。
      </div>
      <div class="dialog-actions">
        <button class="btn-cancel" onclick="closeDialog('dialog2')">取消</button>
        <button class="btn-delete" onclick="closeDialog('dialog2')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          确认删除
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function openDialog(id) {
  document.getElementById(id).classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeDialog(id, event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById(id).classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.dialog-overlay.active').forEach(d => {
      d.classList.remove('active');
    });
    document.body.style.overflow = '';
  }
});
</script>
</body>
</html>
